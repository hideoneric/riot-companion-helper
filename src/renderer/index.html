<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Riot Companion Helper</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0f0e17; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; height: 100vh; }
      #root { height: 100vh; display: flex; flex-direction: column; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, src, line) {
        document.getElementById('root').innerHTML =
          '<div style="color:#cf6679;padding:20px;font-size:11px;font-family:monospace">' +
          '<b>JS Error:</b> ' + msg + '<br><small>' + src + ':' + line + '</small></div>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('root').innerHTML =
          '<div style="color:#f0a500;padding:20px;font-size:11px;font-family:monospace">' +
          '<b>Unhandled rejection:</b> ' + e.reason + '</div>';
      });
    </script>
    <script type="module" src="/renderer/src/main.tsx"></script>
  </body>
</html>
